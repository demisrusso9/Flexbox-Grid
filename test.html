<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Fruta & Fruto</title>
    <style>
        .container {
            background: black;
            display: grid;
        }

        .caixa {
            background-color: green;
            color: #FFF;
            margin: 4px 0;
            height: 60px;
            text-align: center;
        }

        .px {
            width: 16px;
        }
        
        .em {
            width: 1em;
        }

        .rem {
            width: 1rem;
        }

        .per {
            width: 10%;
        }

        .vh {
            width: 1vh;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="caixa px">
            <p>PX</p>
        </div>

        <div class="caixa em">
            <p>EM</p>
        </div>

        <div class="caixa rem">
            <p>REM</p>
        </div>

        <div class="caixa per">
            <p>PER</p>
        </div>

        <div class="caixa vh">
            <p>VH</p>
        </div>
    </div>
</body>

</html>
